# ============================================================
# 5. CREAR CREDIT PACKAGES
# ============================================================
# Nota: Usar createCreditPackage si la mutation existe en API2.
# Si no existe, insertar directamente en la colección credit_packages.

mutation CreateMicroPackage {
  createCreditPackage(input: {
    package_id: "bdh-credits-micro"
    name: "Micro"
    price: 5
    currency: "EUR"
    credits_amount: 500
    bonus_credits: 0
    description: "Prueba el sistema de créditos"
    is_active: true
    development: "bodasdehoy"
  }) {
    package_id
    name
    price
    credits_amount
  }
}

