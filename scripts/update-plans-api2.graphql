# ============================================================
# Script de mutations GraphQL para actualizar planes en API2
# Ejecutar contra: https://api2.eventosorganizador.com/graphql
# Header requerido: Development: bodasdehoy
# Header requerido: Authorization: Bearer <ADMIN_JWT>
# ============================================================

# ============================================================
# 1. ACTUALIZAR PLAN FREE — hard stop + cross-app SKUs
# ============================================================

mutation UpdateFreePlan {
  updateSubscriptionPlan(plan_id: "bodasdehoy-free", input: {
    description: "Prueba gratis todas las funcionalidades básicas"
    product_limits: [
      { sku: "ai-tokens",       service_name: "Consultas IA",       free_quota: 50000,  overage_enabled: false, overage_price: 0 }
      { sku: "image-gen",       service_name: "Imágenes IA",        free_quota: 5,      overage_enabled: false, overage_price: 0 }
      { sku: "storage-gb",      service_name: "Almacenamiento",     free_quota: 1,      overage_enabled: false, overage_price: 0 }
      { sku: "memories-albums", service_name: "Álbumes Memories",   free_quota: 1,      overage_enabled: false, overage_price: 0 }
      { sku: "memories-photos", service_name: "Fotos Memories",     free_quota: 50,     overage_enabled: false, overage_price: 0 }
      { sku: "events-count",    service_name: "Eventos",            free_quota: 1,      overage_enabled: false, overage_price: 0 }
      { sku: "guests-per-event", service_name: "Invitados/evento",  free_quota: 50,     overage_enabled: false, overage_price: 0 }
      { sku: "email-campaigns", service_name: "Emails campaña",     free_quota: 10,     overage_enabled: false, overage_price: 0 }
    ]
    feature_restrictions: {
      max_users: 1
      max_storage_gb: 1
      api_access: false
      advanced_analytics: false
      priority_support: false
      white_label: false
      custom_integrations: false
    }
  }) {
    plan_id
    name
    tier
    product_limits { sku service_name free_quota overage_enabled }
  }
}

