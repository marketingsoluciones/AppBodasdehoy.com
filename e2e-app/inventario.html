<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Tests E2E — AppBodasdehoy.com</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 280px; min-width: 280px; background: #1a1d27; border-right: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* SIDEBAR */
  .sidebar-header { padding: 16px; border-bottom: 1px solid #2d3148; }
  .sidebar-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .progress-bar { background: #2d3148; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 4px; transition: width 0.3s; }
  .progress-text { font-size: 11px; color: #64748b; }

  .sidebar-filters { padding: 10px 16px; border-bottom: 1px solid #2d3148; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 3px 8px; border-radius: 4px; border: 1px solid #2d3148; background: transparent; color: #64748b; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #2d3148; color: #e2e8f0; border-color: #6366f1; }

  .sidebar-list { flex: 1; overflow-y: auto; }
  .sidebar-group { }
  .sidebar-group-title { padding: 10px 16px 4px; font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; position: sticky; top: 0; background: #1a1d27; z-index: 1; }
  .sidebar-item { padding: 8px 16px 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; transition: all 0.1s; font-size: 12px; color: #94a3b8; }
  .sidebar-item:hover { background: #1e2234; color: #e2e8f0; }
  .sidebar-item.active { background: #1e2234; border-left-color: #6366f1; color: #e2e8f0; }
  .sidebar-item .item-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #2d3148; }
  .sidebar-item .item-status.decided { background: #22c55e; }
  .sidebar-item .item-count { margin-left: auto; font-size: 10px; color: #475569; }
  .sidebar-item .item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* DECISION COLORS en sidebar */
  .sidebar-item[data-decision="mantener"] .item-status { background: #22c55e; }
  .sidebar-item[data-decision="consolidar"] .item-status { background: #f59e0b; }
  .sidebar-item[data-decision="eliminar"] .item-status { background: #ef4444; }
  .sidebar-item[data-decision="mover"] .item-status { background: #3b82f6; }
  .sidebar-item[data-decision="diagnostico"] .item-status { background: #a78bfa; }
  .sidebar-item[data-decision="revisar"] .item-status { background: #64748b; }

  /* MAIN HEADER */
  .main-header { padding: 16px 24px; border-bottom: 1px solid #2d3148; background: #1a1d27; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
  .nav-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #2d3148; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .nav-btn:hover { background: #2d3148; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-counter { font-size: 13px; color: #64748b; min-width: 80px; text-align: center; }
  .main-header-title { flex: 1; font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .export-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #6366f1; background: #6366f1; color: white; cursor: pointer; font-size: 12px; font-weight: 600; }
  .export-btn:hover { background: #4f46e5; }

  /* CARD */
  .card { margin: 24px; background: #1a1d27; border-radius: 12px; border: 1px solid #2d3148; overflow: hidden; }
  .card-header { padding: 20px 24px; border-bottom: 1px solid #2d3148; display: flex; align-items: flex-start; gap: 16px; }
  .card-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-app    { background: #1e3a5f; color: #60a5fa; }
  .badge-sec    { background: #3b1f2b; color: #f87171; }
  .badge-crud   { background: #1e3a2b; color: #4ade80; }
  .badge-auth   { background: #2d2b1e; color: #fbbf24; }
  .badge-ui     { background: #1e2a3b; color: #818cf8; }
  .badge-billing{ background: #2a1e3b; color: #c084fc; }
  .badge-infra  { background: #1e2d2d; color: #34d399; }
  .badge-diag   { background: #2d2428; color: #a78bfa; }
  .card-title-section { flex: 1; }
  .card-filename { font-size: 18px; font-weight: 700; color: #e2e8f0; font-family: 'Menlo', 'Monaco', monospace; margin-bottom: 4px; }
  .card-subtitle { font-size: 13px; color: #64748b; }

  .card-body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .card-body { grid-template-columns: 1fr; } }

  .info-block { }
  .info-label { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .info-value { font-size: 13px; color: #cbd5e1; line-height: 1.6; }
  .info-value.mono { font-family: 'Menlo', 'Monaco', monospace; font-size: 12px; }

  .test-list { list-style: none; }
  .test-list li { padding: 4px 0 4px 12px; border-left: 2px solid #2d3148; font-size: 12px; color: #94a3b8; font-family: 'Menlo', 'Monaco', monospace; margin-bottom: 2px; }
  .test-list li:hover { color: #e2e8f0; border-left-color: #6366f1; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
  .tag-warn { background: #422006; color: #fb923c; }
  .tag-ok   { background: #052e16; color: #4ade80; }
  .tag-err  { background: #2d1515; color: #f87171; }
  .tag-info { background: #1e3a5f; color: #60a5fa; }

  /* DECISION SECTION */
  .decision-section { margin: 0 24px 24px; background: #1a1d27; border-radius: 12px; border: 1px solid #2d3148; padding: 20px 24px; }
  .decision-title { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }

  .decision-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .decision-option { position: relative; }
  .decision-option input[type="radio"] { position: absolute; opacity: 0; width: 0; }
  .decision-option label { padding: 8px 16px; border-radius: 8px; border: 2px solid #2d3148; cursor: pointer; font-size: 13px; font-weight: 500; display: block; transition: all 0.15s; color: #94a3b8; }
  .decision-option input[type="radio"]:checked + label { border-color: currentColor; }

  .decision-option.mantener   label { color: #22c55e; }
  .decision-option.consolidar label { color: #f59e0b; }
  .decision-option.eliminar   label { color: #ef4444; }
  .decision-option.mover      label { color: #3b82f6; }
  .decision-option.diagnostico label { color: #a78bfa; }
  .decision-option.revisar    label { color: #64748b; }

  .decision-option.mantener   input:checked + label { background: rgba(34,197,94,0.1); }
  .decision-option.consolidar input:checked + label { background: rgba(245,158,11,0.1); }
  .decision-option.eliminar   input:checked + label { background: rgba(239,68,68,0.1); }
  .decision-option.mover      input:checked + label { background: rgba(59,130,246,0.1); }
  .decision-option.diagnostico input:checked + label { background: rgba(167,139,250,0.1); }
  .decision-option.revisar    input:checked + label { background: rgba(100,116,139,0.1); }

  .comment-label { font-size: 11px; color: #475569; margin-bottom: 6px; }
  .comment-input { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; font-size: 13px; padding: 10px 14px; resize: vertical; min-height: 70px; font-family: inherit; transition: border-color 0.15s; }
  .comment-input:focus { outline: none; border-color: #6366f1; }
  .comment-input::placeholder { color: #475569; }

  .save-indicator { margin-top: 8px; font-size: 11px; color: #4ade80; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }

  /* EXPORT MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 24px; width: 90%; max-width: 700px; max-height: 80vh; overflow: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-pre { background: #0f1117; border-radius: 8px; padding: 16px; font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow: auto; color: #94a3b8; }
  .modal-actions { margin-top: 16px; display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-secondary { background: #2d3148; color: #e2e8f0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Tests E2E · AppBodasdehoy</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 de 57 revisados</div>
    </div>
    <div class="sidebar-filters">
      <button class="filter-btn active" onclick="setFilter('all')">Todos</button>
      <button class="filter-btn" onclick="setFilter('pending')">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('decided')">Revisados</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Anterior</button>
      <span class="nav-counter" id="navCounter">1 / 57</span>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Siguiente →</button>
      <span class="main-header-title" id="mainTitle"></span>
      <button class="export-btn" onclick="openExport()">Exportar JSON</button>
    </div>

    <div id="cardContainer"></div>

    <div class="decision-section">
      <div class="decision-title">Tu decisión</div>
      <div class="decision-options">
        <div class="decision-option mantener">
          <input type="radio" name="decision" id="d-mantener" value="mantener" onchange="saveDecision()">
          <label for="d-mantener">✅ Mantener</label>
        </div>
        <div class="decision-option consolidar">
          <input type="radio" name="decision" id="d-consolidar" value="consolidar" onchange="saveDecision()">
          <label for="d-consolidar">⚠️ Consolidar</label>
        </div>
        <div class="decision-option eliminar">
          <input type="radio" name="decision" id="d-eliminar" value="eliminar" onchange="saveDecision()">
          <label for="d-eliminar">🔴 Eliminar</label>
        </div>
        <div class="decision-option mover">
          <input type="radio" name="decision" id="d-mover" value="mover" onchange="saveDecision()">
          <label for="d-mover">📦 Mover a scripts</label>
        </div>
        <div class="decision-option diagnostico">
          <input type="radio" name="decision" id="d-diagnostico" value="diagnostico" onchange="saveDecision()">
          <label for="d-diagnostico">🔬 Solo diagnóstico</label>
        </div>
        <div class="decision-option revisar">
          <input type="radio" name="decision" id="d-revisar" value="revisar" onchange="saveDecision()">
          <label for="d-revisar">🔁 Revisar / reescribir</label>
        </div>
      </div>
      <div class="comment-label">Notas / comentarios (se guarda automáticamente)</div>
      <textarea class="comment-input" id="commentInput" placeholder="Escribe aquí tus notas sobre este test..." oninput="saveComment()"></textarea>
      <div class="save-indicator" id="saveIndicator">✓ Guardado</div>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">Exportar inventario</div>
    <pre class="modal-pre" id="exportContent"></pre>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="copyExport()">Copiar al portapapeles</button>
      <button class="btn btn-secondary" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

// Eliminar duplicado de auth-flow-multiapp en infra (aparece 2 veces)
const SEEN = new Set();
const SPECS_UNIQUE = SPECS.filter(s => {
  const key = s.file;
  if (SEEN.has(key)) return false;
  SEEN.add(key);
  return true;
});

// ─── STATE ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'e2e_inventory_v1';
let currentIndex = 0;
let currentFilter = 'all';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

const BADGE_CLASS = { auth: 'badge-auth', sec: 'badge-sec', crud: 'badge-crud', chat: 'badge-app', ui: 'badge-ui', billing: 'badge-billing', guest: 'badge-infra', notif: 'badge-infra', infra: 'badge-infra', diag: 'badge-diag' };

function filteredSpecs() {
  const state = loadState();
  if (currentFilter === 'all') return SPECS_UNIQUE;
  if (currentFilter === 'pending') return SPECS_UNIQUE.filter(s => !state[s.file]?.decision);
  if (currentFilter === 'decided') return SPECS_UNIQUE.filter(s => !!state[s.file]?.decision);
  return SPECS_UNIQUE;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentIndex = 0;
  renderSidebar();
  renderCard();
}

function renderSidebar() {
  const state = loadState();
  const specs = filteredSpecs();
  const list = document.getElementById('sidebarList');

  // Group by category
  const groups = {};
  specs.forEach((s, i) => {
    const g = s.catLabel;
    if (!groups[g]) groups[g] = [];
    groups[g].push({ spec: s, idx: i });
  });

  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    html += `<div class="sidebar-group"><div class="sidebar-group-title">${group}</div>`;
    items.forEach(({ spec, idx }) => {
      const d = state[spec.file] || {};
      const decided = !!d.decision;
      html += `<div class="sidebar-item ${idx === currentIndex ? 'active' : ''}" data-idx="${idx}" data-decision="${d.decision||''}" onclick="goTo(${idx})">
        <div class="item-status ${decided ? 'decided' : ''}"></div>
        <span class="item-name">${spec.file.replace('.spec.ts','')}</span>
        <span class="item-count">${spec.tests}t</span>
      </div>`;
    });
    html += '</div>';
  }
  list.innerHTML = html;

  // Progress
  const total = SPECS_UNIQUE.length;
  const done = SPECS_UNIQUE.filter(s => !!state[s.file]?.decision).length;
  document.getElementById('progressFill').style.width = `${(done/total*100).toFixed(0)}%`;
  document.getElementById('progressText').textContent = `${done} de ${total} revisados`;
}

function renderCard() {
  const specs = filteredSpecs();
  if (specs.length === 0) {
    document.getElementById('cardContainer').innerHTML = '<div style="padding:40px;text-align:center;color:#475569">No hay specs en este filtro</div>';
    return;
  }
  if (currentIndex >= specs.length) currentIndex = 0;
  const spec = specs[currentIndex];
  const state = loadState();
  const d = state[spec.file] || {};

  document.getElementById('mainTitle').textContent = spec.file;
  document.getElementById('navCounter').textContent = `${currentIndex + 1} / ${specs.length}`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === specs.length - 1;

  const testListHtml = spec.testNames.map(t => `<li>${t}</li>`).join('');
  const describesHtml = spec.describes.map(d => `<span class="tag tag-info">${d}</span>`).join(' ');
  const depsHtml = spec.deps.map(d => `<span class="tag tag-warn">${d}</span>`).join(' ');
  const skipClass = spec.skipLogic.includes('smoke') ? 'tag-ok' : spec.skipLogic.includes('Sin skip') ? 'tag-err' : 'tag-warn';

  document.getElementById('cardContainer').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-badge ${BADGE_CLASS[spec.cat]||'badge-app'}">${spec.catLabel}</div>
        </div>
        <div class="card-title-section">
          <div class="card-filename">${spec.file}</div>
          <div class="card-subtitle">${spec.tests} tests · ${spec.app}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="info-block" style="grid-column:1/-1">
          <div class="info-label">Objetivo</div>
          <div class="info-value">${spec.objetivo}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Describes / Batches</div>
          <div class="info-value">${describesHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Tests individuales</div>
          <ul class="test-list">${testListHtml}</ul>
        </div>
        <div class="info-block">
          <div class="info-label">Dependencias</div>
          <div class="info-value">${depsHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Skip logic</div>
          <div class="info-value"><span class="tag ${skipClass}">${spec.skipLogic}</span></div>
        </div>
        ${spec.notas ? `<div class="info-block" style="grid-column:1/-1">
          <div class="info-label">Notas previas</div>
          <div class="info-value">${spec.notas}</div>
        </div>` : ''}
      </div>
    </div>`;

  // Restore decision
  document.querySelectorAll('input[name="decision"]').forEach(r => r.checked = false);
  if (d.decision) {
    const radio = document.getElementById(`d-${d.decision}`);
    if (radio) radio.checked = true;
  }
  document.getElementById('commentInput').value = d.comment || '';
}

function goTo(idx) {
  currentIndex = idx;
  renderSidebar();
  renderCard();
  document.querySelector('.main').scrollTo(0, 0);
}

function navigate(dir) {
  const specs = filteredSpecs();
  currentIndex = Math.max(0, Math.min(specs.length - 1, currentIndex + dir));
  renderSidebar();
  renderCard();
  document.querySelector('.main').scrollTo(0, 0);
}

let saveTimer;
function saveDecision() {
  const specs = filteredSpecs();
  const spec = specs[currentIndex];
  if (!spec) return;
  const state = loadState();
  if (!state[spec.file]) state[spec.file] = {};
  const checked = document.querySelector('input[name="decision"]:checked');
  state[spec.file].decision = checked ? checked.value : '';
  saveState(state);
  showSaved();
  renderSidebar();
}

function saveComment() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const specs = filteredSpecs();
    const spec = specs[currentIndex];
    if (!spec) return;
    const state = loadState();
    if (!state[spec.file]) state[spec.file] = {};
    state[spec.file].comment = document.getElementById('commentInput').value;
    saveState(state);
    showSaved();
  }, 600);
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────

function openExport() {
  const state = loadState();
  const result = SPECS_UNIQUE.map(s => ({
    file: s.file,
    cat: s.catLabel,
    app: s.app,
    tests: s.tests,
    objetivo: s.objetivo,
    decision: state[s.file]?.decision || 'pendiente',
    comentario: state[s.file]?.comment || '',
  }));
  document.getElementById('exportContent').textContent = JSON.stringify(result, null, 2);
  document.getElementById('exportModal').classList.add('open');
}

function closeExport() {
  document.getElementById('exportModal').classList.remove('open');
}

function copyExport() {
  const text = document.getElementById('exportContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar al portapapeles', 2000);
  });
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  if (e.key === '1') document.getElementById('d-mantener').click();
  if (e.key === '2') document.getElementById('d-consolidar').click();
  if (e.key === '3') document.getElementById('d-eliminar').click();
  if (e.key === '4') document.getElementById('d-mover').click();
  if (e.key === '5') document.getElementById('d-diagnostico').click();
  if (e.key === '6') document.getElementById('d-revisar').click();
});

// Cargar datos pre-cargados (my recs)
function loadPreRecs() {
  const state = loadState();
  SPECS_UNIQUE.forEach(s => {
    if (s.rec && !state[s.file]) {
      state[s.file] = { decision: s.rec, comment: s.notas || '' };
    }
  });
  saveState(state);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

loadPreRecs();
renderSidebar();
renderCard();
</script>
